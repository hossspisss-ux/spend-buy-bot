<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial; }
        .box { background: #111; padding: 40px; border: 1px solid #333; width: 300px; }
        h1 { text-align: center; margin-bottom: 30px; font-weight: normal; }
        input { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 10px; margin-bottom: 20px; }
        button { width: 100%; background: #333; border: 1px solid #555; color: #fff; padding: 10px; cursor: pointer; }
        button:hover { background: #444; }
        .error { color: #f00; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>SPEND BUY 2.1</h1>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post">
            <input type="password" name="pass" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
